name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build
      uses: game-ci/unity-builder@v4
      with:
        targetPlatform: Android
        allowDirtyBuild: true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: APK
        path: build/Android/*.apk
